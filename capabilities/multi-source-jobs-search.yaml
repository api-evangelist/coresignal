naftiko: 1.0.0-alpha2
info:
  label: Coresignal Multi-source Jobs API — Search
  description: 'Coresignal Multi-source Jobs API — Search. 2 operations. Lead operation: Search Jobs (Elasticsearch DSL).
    Self-contained Naftiko capability covering one Coresignal business surface.'
  tags:
  - Coresignal
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CORESIGNAL_API_KEY: CORESIGNAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: multi-source-jobs-search
    baseUri: https://api.coresignal.com/cdapi/v2/multi_source_jobs
    description: Coresignal Multi-source Jobs API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search-es_dsl
      path: /search/es_dsl
      operations:
      - name: searchjobsbyesdsl
        method: POST
        description: Search Jobs (Elasticsearch DSL)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: search-filter
      path: /search/filter
      operations:
      - name: searchjobsbyfilter
        method: POST
        description: Search Jobs (filter)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.CORESIGNAL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: multi-source-jobs-search-rest
    port: 8080
    description: REST adapter for Coresignal Multi-source Jobs API — Search. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/search/es-dsl
      name: search-es-dsl
      description: REST surface for search-es_dsl.
      operations:
      - method: POST
        name: searchjobsbyesdsl
        description: Search Jobs (Elasticsearch DSL)
        call: multi-source-jobs-search.searchjobsbyesdsl
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/filter
      name: search-filter
      description: REST surface for search-filter.
      operations:
      - method: POST
        name: searchjobsbyfilter
        description: Search Jobs (filter)
        call: multi-source-jobs-search.searchjobsbyfilter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: multi-source-jobs-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coresignal Multi-source Jobs API — Search. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: search-jobs-elasticsearch-dsl
      description: Search Jobs (Elasticsearch DSL)
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: multi-source-jobs-search.searchjobsbyesdsl
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-jobs-filter
      description: Search Jobs (filter)
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: multi-source-jobs-search.searchjobsbyfilter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
