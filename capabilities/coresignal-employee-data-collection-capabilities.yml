name: Coresignal Employee Data Collection Capabilities
description: >-
  Workflow capabilities provided by the Coresignal Multi-source Employee
  API for employee discovery, talent intelligence, and contact enrichment.
url: https://docs.coresignal.com/multi-source-employee-api/
version: '1.0'
modified: '2026-04-28'
api: Coresignal Multi-source Employee API
baseURL: https://api.coresignal.com/cdapi/v2/multi_source_employee
capabilities:
  - name: Search Employees by Filter
    description: >-
      Find employee records by current company, title, country, location,
      industry, or skills using structured filters.
    operations:
      - searchEmployeesByFilter
    inputs:
      - EmployeeFilter
    outputs:
      - Array of employee IDs
  - name: Search Employees by Elasticsearch DSL
    description: >-
      Run advanced Elasticsearch DSL queries to combine experience, education,
      skills, and demographic criteria for sophisticated talent searches.
    operations:
      - searchEmployeesByEsDsl
    inputs:
      - Elasticsearch DSL query body
    outputs:
      - Array of employee IDs
  - name: Collect Employee Records
    description: >-
      Retrieve a fully-enriched employee profile with 300+ fields including
      experience, education, skills, certifications, and connections.
    operations:
      - collectEmployee
    inputs:
      - employee id
    outputs:
      - Employee record
  - name: Bulk Collect Employees
    description: >-
      Retrieve full profiles for many employees at once for batch
      enrichment workflows.
    operations:
      - bulkCollectEmployees
    inputs:
      - Array of employee IDs
    outputs:
      - Array of employee records
useCases:
  - name: Talent Sourcing
    description: Source candidates by skills, experience, and location for executive search and recruiting.
    capabilities:
      - Search Employees by Filter
      - Search Employees by Elasticsearch DSL
      - Collect Employee Records
  - name: Sales Lead Enrichment
    description: Enrich CRM contacts with current job title, company, and tenure.
    capabilities:
      - Collect Employee Records
      - Bulk Collect Employees
  - name: People Movement Analytics
    description: Analyze hiring patterns and employee movement between companies.
    capabilities:
      - Search Employees by Elasticsearch DSL
      - Bulk Collect Employees
