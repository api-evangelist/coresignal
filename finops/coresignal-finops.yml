specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Coresignal
providerId: coresignal
publisherName: Coresignal, UAB
serviceCategory: B2B Data API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - B2B Data
  - Companies
  - Data as a Service
  - Employees
  - Job Postings
  - Sales Intelligence
  - FinOps
  - Cost Management
  - FOCUS
description: FOCUS-aligned FinOps for Coresignal - monthly subscription minimum plus credit-metered
  consumption (Collect and Search credits) with tiered per-record pricing. Datasets product is custom-priced
  and billed per contract.
sources:
  - https://coresignal.com/pricing/
  - https://docs.coresignal.com/api-introduction/rate-limits
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription + Credit Consumption
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Coresignal
  ServiceCategory: B2B Data API
  ProviderName: Coresignal
  PublisherName: Coresignal, UAB
  InvoiceIssuerName: Coresignal, UAB
  PricingCategory: Usage-Based
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: collect_credits
    description: Collect (GET / Bulk Collect) credits consumed against the plan allotment
    unit: credit
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - api_key
      - plan
  - name: search_credits
    description: Search (POST) credits consumed against the plan allotment
    unit: credit
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - api_key
      - plan
  - name: records_returned
    description: Records returned to the consumer (basis for per-record pricing)
    unit: record
    aggregation: sum
    dimensions:
      - api
      - record_type
      - api_key
  - name: subscription_fee
    description: Monthly subscription minimum charge
    unit: month
    aggregation: max
    dimensions:
      - plan
      - billing_term
  - name: dataset_license
    description: Dataset (companies / employees / jobs) license fee
    unit: month
    aggregation: max
    dimensions:
      - dataset
      - delivery_cadence
principles:
  - name: Visibility
    description: Monitor per-API-key Collect and Search credit consumption from the Coresignal dashboard
      against the monthly allotment. Track per-record pricing tier breakpoints to forecast unit cost
      as volume grows.
  - name: Allocation
    description: Issue separate API keys per consuming team, environment, or downstream product so
      credit consumption can be allocated. Tag retrieved records by use case (lead-gen, talent intelligence,
      enrichment) to attribute cost to revenue-generating workflows.
  - name: Optimization
    description: Use Search to filter precisely before issuing Collect calls; prefer Bulk Collect for
      ingest workloads (higher rate-limit budget at 27 rps); cache and dedupe records to avoid re-billing
      for the same entity; size monthly commit at the next price-tier breakpoint to lower per-record
      cost; consider annual prepay for the published 20% discount.
  - name: Accountability
    description: Designate an owner per API key with a monthly credit budget. Alert on burn-rate to
      avoid hitting the credit cap mid-month, and review actual records-returned vs. committed plan
      tier each renewal cycle.
maintainers:
