specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Coresignal
providerId: coresignal
publisherName: Coresignal
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Agentic Search
  - B2B Data
  - Companies
  - Company Data
  - Data as a Service
  - Elasticsearch
  - Employee Data
  - Employees
