specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Coresignal
providerId: coresignal
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Agentic Search
  - B2B Data
  - Companies
  - Data as a Service
  - Employees
  - Job Postings
  - Rate Limiting
  - Quotas
  - Throttling
description: Coresignal publishes per-API rate limits expressed in requests per second (or per minute
  for subscription endpoints). Limits are scoped to the API key and differ by request type - Collect
  (GET) requests get the highest budget, Search (POST) and Enrich (GET) requests are throttled tighter,
  and Bulk Collect sits between them. Subscription endpoints (Real-time and Clean Employee API) use
  per-minute budgets. Monthly credit allotments are governed by the plan and act as quotas, not as
  short-window throttles.
sources:
  - https://docs.coresignal.com/api-introduction/rate-limits
  - https://coresignal.com/pricing/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Collect (GET) requests
    scope: api-key
    metric: requests_per_second
    limit: 54
    timeFrame: second
    notes: Applies across most APIs (Company, Employee, Jobs Collect endpoints).
  - name: Search (POST) and Enrich (GET) requests
    scope: api-key
    metric: requests_per_second
    limit: 18
    timeFrame: second
    notes: Applies to most Company and Employee Search/Enrich endpoints.
  - name: Bulk Collect operations
    scope: api-key
    metric: requests_per_second
    limit: 27
    timeFrame: second
    notes: Applies to Bulk Collect across Company, Employee, and Jobs APIs.
  - name: Clean Employee API (subscription)
    scope: api-key
    metric: requests_per_minute
    limit: 9
    timeFrame: minute
  - name: Base Employee API (subscription)
    scope: api-key
    metric: requests_per_minute
    limit: 18
    timeFrame: minute
  - name: Real-time Employee API
    scope: api-key
    metric: urls_per_minute
    limit: 50
    timeFrame: minute
    notes: Measured in URLs submitted per minute rather than HTTP calls.
  - name: Plan credit allotment
    scope: account
    metric: credits
    limit: see plan tier
    notes: Monthly Collect and Search credits are governed by the subscribed plan (Starter / Pro / Premium).
      Treat as a quota, not a per-second throttle.
policies:
  - name: Per-API-key scoping
    description: Rate limits are enforced per API key. Multi-tenant consumers should issue separate
      keys per environment or downstream tenant for isolation.
  - name: Backoff Strategy
    description: On 429 responses, back off and retry; the documented per-second limits are short-window,
      so even a 1-2 second pause typically clears the throttle.
  - name: Credits vs throttling
    description: Hitting the monthly credit cap blocks further calls until renewal or top-up; this is
      separate from per-second request throttling.
  - name: Bulk vs single-record
    description: For bulk-style ingest, prefer Bulk Collect (27 rps) over multiple single-record Collect
      calls to maximize throughput within the published budget.
maintainers:
