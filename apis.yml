- aid: coresignal:agentic-search-api
  name: Coresignal Agentic Search API
  description: The Agentic Search API enables natural language search across Coresignal's company, employee, and jobs datasets,
    returning relevant records based on conversational queries. Designed for AI agents and automated workflows that need quick
    B2B data lookups without crafting Elasticsearch queries.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://docs.coresignal.com/agentic-search-api/
  baseURL: https://api.coresignal.com/cdapi/v2/agentic_search
  tags:
  - Agentic Search
  - AI Agents
  - Natural Language
