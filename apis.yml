- aid: coresignal:multi-source-company-api
  name: Coresignal Multi-source Company API
  description: The Multi-source Company API returns enriched company records combining data from multiple public web sources,
    deduplicated and standardized with 500+ data fields covering firmographics, technographics, headcount, revenue, and locations.
    Search uses Elasticsearch DSL. Results are paginated and credits-priced per response.
