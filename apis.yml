aid: coresignal
name: Coresignal
kind: company
description: Coresignal is a data-as-a-service company providing access to public web data on companies, employees, and jobs
  through a suite of REST APIs. The platform aggregates and refines more than 4.5 billion data records covering 75M+ companies
  (with 500+ data fields), 865M+ employee profiles (300+ fields), and 461M+ job postings (85+ fields). Coresignal offers Multi-source,
  Clean, and Base data tiers across Company, Employee, and Jobs APIs, plus specialized real-time, employee posts, agentic
  search, and company enrichment endpoints. Authentication uses a single apikey HTTP header.
