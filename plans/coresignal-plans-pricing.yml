specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Coresignal
providerId: coresignal
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Agentic Search
  - B2B Data
  - Companies
  - Company Data
  - Data as a Service
  - Elasticsearch
  - Employee Data
  - Employees
  - Enrichment
  - Firmographics
  - Job Postings
  - Jobs
  - Lead Generation
  - People Data
  - Sales Intelligence
  - Talent Intelligence
  - Web Data
description: Coresignal sells API access to its B2B web data (companies, employees, jobs) on credit-based
  monthly subscriptions. Each plan includes a minimum number of Collect and Search credits with monthly
  reset; per-record price drops as credit volume increases. A separate Datasets product is sold via
  custom contract starting at $1,000. Annual prepay receives a 20% discount.
sources:
  - https://coresignal.com/pricing/
  - https://docs.coresignal.com/api-introduction/rate-limits
plans:
  - id: coresignal-free
    name: Free
    type: freemium
    description: 7-day free evaluation, no credit card. 200 Collect + 400 Search credits across the
      employee, company, and jobs endpoints.
    entries:
      - label: Collect credits
        name: collect_credits
        type: quota
        metric: credit
        limit: 200
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Search credits
        name: search_credits
        type: quota
        metric: credit
        limit: 400
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 7-day trial validity
      - name: Employee, company, jobs endpoints
      - name: Elasticsearch Query DSL
      - name: Technical support
  - id: coresignal-starter
    name: Starter
    type: subscription
    description: Entry monthly subscription. Credits reset each month; per-record price scales with
      committed volume.
    entries:
      - label: Monthly subscription
        name: monthly_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: starting from $49/month
        userMultiplied: false
      - label: Collect credits (minimum)
        name: collect_credits
        type: quota
        metric: credit
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.196-$0.133/record'
        userMultiplied: false
      - label: Search credits (minimum)
        name: search_credits
        type: quota
        metric: credit
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.196-$0.133/record'
        userMultiplied: false
    elements:
      - name: Monthly credit renewal
      - name: Employee, company, jobs endpoints
      - name: Elasticsearch Query DSL
      - name: Technical support
      - name: 20% discount on annual prepay
  - id: coresignal-pro
    name: Pro
    type: subscription
    description: Mid-volume tier with dedicated account manager and lower per-record pricing.
    entries:
      - label: Monthly subscription
        name: monthly_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: starting from $800/month
        userMultiplied: false
      - label: Collect credits (minimum)
        name: collect_credits
        type: quota
        metric: credit
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.080-$0.050/record'
        userMultiplied: false
      - label: Search credits (minimum)
        name: search_credits
        type: quota
        metric: credit
        limit: 20000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.080-$0.050/record'
        userMultiplied: false
    elements:
      - name: Dedicated account manager
      - name: Employee, company, jobs endpoints
      - name: Elasticsearch Query DSL
      - name: 20% discount on annual prepay
  - id: coresignal-premium
    name: Premium
    type: subscription
    description: High-volume tier (recommended) with the lowest per-record pricing, historical headcount
      data access, and Employee API webhooks.
    entries:
      - label: Monthly subscription
        name: monthly_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: starting from $1,500/month
        userMultiplied: false
      - label: Collect credits (minimum)
        name: collect_credits
        type: quota
        metric: credit
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.030-$0.005/record'
        userMultiplied: false
      - label: Search credits (minimum)
        name: search_credits
        type: quota
        metric: credit
        limit: 150000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.030-$0.005/record'
        userMultiplied: false
    elements:
      - name: Historical headcount API access
      - name: Employee API webhooks
      - name: Dedicated account manager
      - name: Employee, company, jobs endpoints
      - name: 20% discount on annual prepay
  - id: coresignal-datasets
    name: Datasets
    type: enterprise
    description: Bulk dataset product (companies, employees, jobs) delivered monthly with historical
      data. Custom-priced.
    entries:
      - label: Dataset license
        name: dataset_license
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        unit: 1
        price: starting from $1,000 (custom)
        userMultiplied: false
    elements:
      - name: Companies dataset
      - name: Employees dataset
      - name: Jobs dataset
      - name: Monthly delivery
      - name: Historical data
      - name: Bundling and prepayment discounts
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
